name: Keepalive Workflow

on:
  schedule:
    - cron: '0 0 1 * *' # 每月1号运行
  workflow_dispatch:   # 允许手动运行

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive Action
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
