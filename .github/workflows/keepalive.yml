name: Keepalive Workflow
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive Action
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
